<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass UI Kit</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="kit-wrapper">

    <div class="kit-header">
      <h1 class="kit-title">liquid glass</h1>
      <span class="kit-sub">Liquid Glass UI Kit Showcase</span>
    </div>

    <div class="grid">

      <!-- PRIMARY -->
      <div class="glass btn-primary">
        <div class="g-wrap">
          <div class="g-sheen"></div>
          <div class="g-depth"></div>
          <div class="g-rim"></div>
          <div class="g-shimmer"></div>
          <span class="g-label">Start project</span>
        </div>
      </div>

      <!-- SECONDARY -->
      <div class="glass btn-secondary">
        <div class="g-wrap">
          <div class="g-sheen"></div>
          <div class="g-depth"></div>
          <div class="g-rim"></div>
          <div class="g-shimmer"></div>
          <span class="g-label">Secondary</span>
        </div>
      </div>

      <!-- ICON BUTTON -->
      <div class="glass btn-icon">
        <div class="g-wrap">
          <div class="g-sheen"></div>
          <div class="g-depth"></div>
          <div class="g-rim"></div>
          <div class="g-shimmer"></div>
          <div class="icon-circle">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2.5" />
              <path d="M9 9h6M9 12h6M9 15h4" />
            </svg>
          </div>
          <span class="g-label">Icon button</span>
        </div>
      </div>

      <!-- TEXT FIELD -->
      <div class="glass field-text">
        <div class="g-wrap">
          <div class="g-sheen"></div>
          <div class="g-depth"></div>
          <div class="g-rim"></div>
          <div class="g-shimmer"></div>
          <span class="field-ph">Text field</span>
          <div class="field-icon">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7" />
              <path d="M21 21l-4.35-4.35" />
            </svg>
          </div>
        </div>
      </div>

      <!-- SELECT -->
      <div class="glass btn-select">
        <div class="g-wrap">
          <div class="g-sheen"></div>
          <div class="g-depth"></div>
          <div class="g-rim"></div>
          <div class="g-shimmer"></div>
          <span class="g-label">Select</span>
          <div class="check-bubble">
            <svg viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
        </div>
      </div>

      <!-- SWITCH -->
      <div class="glass btn-switch">
        <div class="g-wrap">
          <div class="g-sheen"></div>
          <div class="g-depth"></div>
          <div class="g-rim"></div>
          <div class="g-shimmer"></div>
          <span class="g-label">Switch</span>
          <div class="toggle-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>

      <!-- TABS PANEL -->
      <div class="glass panel-tabs">
        <div class="g-wrap">
          <div class="g-sheen"></div>
          <div class="g-depth"></div>
          <div class="g-rim"></div>
          <div class="g-shimmer"></div>
          <div class="tab-hdr">
            <div class="tab-back"><svg viewBox="0 0 24 24">
                <polyline points="15 18 9 12 15 6" />
              </svg></div>
            <span class="tab-name">Tabs</span>
          </div>
          <div class="tab-div"></div>
          <div class="tab-item">Find files...</div>
          <div class="tab-item">Add collaborator</div>
        </div>
      </div>

      <!-- PREMIUM CARD -->
      <div class="glass card-premium">
        <div class="g-wrap">
          <div class="g-sheen"></div>
          <div class="g-depth"></div>
          <div class="g-rim"></div>
          <div class="g-shimmer"></div>
          <div class="card-plan">Pro plan</div>
          <div class="card-div"></div>
          <div class="card-row"><span>Focus rig, hover states,</span></div>
          <div class="card-row"><span>Disabled states</span><span>3</span></div>
        </div>
      </div>

    </div>

    <div class="kit-footer">Crafted with pure CSS · Glassmorphism · 2026</div>
  </div>
</body>

</html>
